server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: server_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: server_logs
          __path__: /var/log/server.log

    pipeline_stages:
      - regex:
          expression: '\[(?P<time>.*?)\] \[(?P<level>.*?)\] (?P<message>.*)'

      - timestamp:
          source: time
          format: 'Mon Jan 02 15:04:05 2006'
          location: UTC   # remove if logs are not UTC

      - labels:
          level: